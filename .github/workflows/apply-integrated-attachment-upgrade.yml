name: Apply integrated attachment upgrade

on:
  push:
    branches:
      - agent/files-github-supabase-security
    paths:
      - scripts/apply-integrated-attachment-upgrade.mjs
      - .github/workflows/apply-integrated-attachment-upgrade.yml

permissions:
  contents: write

concurrency:
  group: integrated-attachment-upgrade
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/files-github-supabase-security
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply focused upgrade
        run: node scripts/apply-integrated-attachment-upgrade.mjs

      - name: Verify lint, types, tests and production build
        run: npm run check

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "expand secure chat attachment support"
          git push origin HEAD:agent/files-github-supabase-security
